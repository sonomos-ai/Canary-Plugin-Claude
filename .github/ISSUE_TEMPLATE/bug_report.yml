name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much detail as you can.
  - type: input
    id: version
    attributes:
      label: Canary version
      description: "Run `/canary:leaked stats` or check `canary/.claude-plugin/plugin.json`"
      placeholder: "1.3.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs what actually happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Which component is affected?
      options:
        - Regex detectors
        - Semantic (LLM) scan
        - Dashboard
        - Statusline / HUD
        - CLI tools (canary-stats, canary-export)
        - Session start / welcome message
        - Installation / plugin loading
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. DO NOT paste any actual PII — redact it first.
      render: shell
